<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checking Site</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section id="checking" class="panel">
        <h1>Checking this site...</h1>
        <p>Please wait while the fast safety check runs.</p>
        <div id="checking-url" class="url"></div>
      </section>

      <section id="warning" class="panel hidden">
        <h1>This site might be suspicious.</h1>
        <p id="warning-reason"></p>
        <div id="warning-url" class="url"></div>
        <label>
          Optional note
          <textarea id="note" rows="3" placeholder="Why are you proceeding to this site?"></textarea>
        </label>
        <div class="actions">
          <button id="continue" class="warn">Continue</button>
          <button id="deep-scan" class="primary">Deep Scan</button>
          <button id="go-back" class="danger">Go Back</button>
          <button id="dashboard">Open Dashboard</button>
        </div>
      </section>

      <section id="offline" class="panel hidden">
        <h1>Could not check this site.</h1>
        <p>No connection to the scan server. You can continue at your own discretion or go back.</p>
        <div id="offline-url" class="url"></div>
        <div class="actions">
          <button id="offline-continue" class="warn">Continue</button>
          <button id="offline-back" class="danger">Go Back</button>
          <button id="offline-dashboard">Open Dashboard</button>
        </div>
      </section>
    </main>
    <script src="interstitial.js"></script>
  </body>
</html>
