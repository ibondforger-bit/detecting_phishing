<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebSense</title>
    <link rel="stylesheet" href="styles.css">
    <style>body{width:320px} main{width:auto;margin:12px}</style>
  </head>
  <body>
    <main class="grid">
      <section class="panel">
        <h2>WebSense</h2>
        <p>Server-backed URL checks and deep scan reports.</p>
        <div id="status-container" style="display:flex; align-items:center; margin-bottom:12px; font-weight:bold; font-size:13px;">
          <span id="status-dot" style="display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; background-color:#ef4444;"></span>
          <span id="status-text">Checking status...</span>
        </div>
        <div class="actions">
          <button id="dashboard" class="primary">Open Dashboard</button>
          <button id="report">Recent Report</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
